<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Login - Small Business Expansion Grant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../../assets/css/style.css">
<style>
body { background: var(--primary); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.login-box { background: var(--white); max-width: 400px; width: 100%; padding: 40px; }
.login-box .logo-area { text-align: center; margin-bottom: 32px; }
.login-box .logo-area img { height: 48px; }
.login-box .logo-area h2 { font-size: 20px; margin-top: 12px; }
.login-box .logo-area p { font-size: 13px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; color: var(--text-light); }
.form-group input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); font-family: var(--font); font-size: 15px; outline: none; transition: var(--transition); }
.form-group input:focus { border-color: var(--accent); }
.btn-submit { width: 100%; padding: 14px; background: var(--primary); color: var(--white); border: none; font-family: var(--font); font-size: 15px; font-weight: 700; cursor: pointer; transition: var(--transition); text-transform: uppercase; letter-spacing: 1px; }
.btn-submit:hover { background: var(--accent); }
.error-msg { color: #ef4444; font-size: 12px; margin-top: 12px; text-align: center; display: none; }
</style>
</head>
<body>
<div class="login-box">
<div class="logo-area">
<img src="../../assets/img/logo.jpg" alt="SBG">
<h2>Admin Login</h2>
<p>Small Business Expansion Grant</p>
</div>
<form id="loginForm">
<div class="form-group">
<label>Username</label>
<input type="text" id="loginUser" placeholder="admin" required>
</div>
<div class="form-group">
<label>Password</label>
<input type="password" id="loginPassword" placeholder="Enter password" required>
</div>
<button type="submit" class="btn-submit">Sign In <i class="fas fa-arrow-right"></i></button>
<div class="error-msg" id="loginError">Invalid credentials. Try again.</div>
</form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', function (e) {
e.preventDefault();
var user = document.getElementById('loginUser').value;
var pass = document.getElementById('loginPassword').value;
if (user === 'admin' && pass === '0000') {
localStorage.setItem('sbg_admin_auth', JSON.stringify({ user: user, name: 'Admin', loggedInAt: new Date().toISOString() }));
window.location.href = '../admin/';
} else {
document.getElementById('loginError').style.display = 'block';
}
});
</script>
</body>
</html>
