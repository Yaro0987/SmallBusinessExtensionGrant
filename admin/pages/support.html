<div class="table-wrap">
<div class="tbl-header"><h3>Support Tickets</h3>
<div class="tbl-actions">
<select id="supportFilter" style="padding:6px 10px;border:1px solid var(--border);font-family:var(--font);font-size:12px;outline:none;background:var(--white);color:var(--text);">
<option value="all">All Tickets</option>
<option value="open">Open</option>
<option value="resolved">Resolved</option>
</select>
</div>
</div>
<div class="empty-state" id="supportEmpty"><i class="fas fa-ticket-alt"></i><p>No support tickets yet.</p></div>
<div style="display:none;" id="supportTable"><table><thead><tr><th>#</th><th>Name</th><th>Subject</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead><tbody id="supportBody"></tbody></table></div>
</div>

<div class="modal-overlay" id="supportReplyModal" style="display:none;">
<div class="modal-box" style="max-width:600px;">
<div class="modal-header"><h3 id="replyModalTitle">Ticket Details</h3><button class="modal-close" id="replyModalClose">&times;</button></div>
<div class="modal-body" id="replyModalBody"></div>
</div>
</div>

<style>
.tbl-actions{display:flex;gap:8px;align-items:center}
.tbl-actions select{cursor:pointer}
.tbl-actions select:focus{border-color:var(--accent)}
.support-message{padding:12px 16px;background:var(--light-bg);margin:12px 0;font-size:14px;line-height:1.7;white-space:pre-wrap;color:var(--text)}
.support-reply{background:#d1fae5;border:1px solid #10b981;padding:12px 16px;margin:8px 0;font-size:13px;line-height:1.6;color:#065f46}
.support-reply-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#10b981;margin-bottom:4px;display:block}
.ticket-status{padding:3px 10px;font-size:10px;font-weight:700;text-transform:uppercase;display:inline-block}
.ticket-status.open{background:#fef3c7;color:#92400e}
.ticket-status.resolved{background:#d1fae5;color:#065f46}
.btn-success{background:#10b981}
.btn-success:hover{background:#059669}
</style>

<script>
(function(){
var base=window.BASE_PATH||'/sbg/';
var apiUrl=base+'admin/api/data.php';

function load(){
fetch(apiUrl+'?type=support')
.then(function(r){return r.json()})
.then(function(res){
var tickets=res.success&&res.data?res.data:[];
var filter=document.getElementById('supportFilter').value;
var filtered=tickets;
if(filter!=='all')filtered=tickets.filter(function(t){return t.status===filter});
var empty=document.getElementById('supportEmpty');
var table=document.getElementById('supportTable');
var body=document.getElementById('supportBody');
if(!filtered.length){empty.style.display='block';table.style.display='none';return}
empty.style.display='none';table.style.display='block';body.innerHTML='';
filtered.forEach(function(t,i){
var tr=document.createElement('tr');tr.className='searchable-row';
tr.innerHTML='<td>'+(t.id||'')+'</td><td>'+(t.name||'')+'<br><small style="color:var(--text-light)">'+(t.email||'')+'</small></td><td>'+(t.subject||'')+'</td><td>'+(t.date||'')+'</td><td><span class="ticket-status '+(t.status||'open')+'">'+(t.status||'open')+'</span></td><td><div class="action-wrap"><button class="action-dots"><i class="fas fa-ellipsis-v"></i></button><div class="action-dropdown"><a class="ad-reply" data-idx="'+i+'" data-total="'+tickets.length+'"><i class="fas fa-reply"></i> View / Reply</a><a class="ad-resolve" data-idx="'+i+'" data-total="'+tickets.length+'"><i class="fas fa-check"></i> Mark Resolved</a></div></div></td>';
body.appendChild(tr);
});
bindActions(tickets);
})
.catch(function(){});
}

function bindActions(tickets){
document.querySelectorAll('.action-dots').forEach(function(btn){
btn.addEventListener('click',function(e){
e.stopPropagation();
document.querySelectorAll('.action-dropdown').forEach(function(d){d.classList.remove('show');});
var drop=btn.nextElementSibling;
if(drop)drop.classList.toggle('show');
});
});
document.addEventListener('click',function(){
document.querySelectorAll('.action-dropdown').forEach(function(d){d.classList.remove('show');});
});
document.querySelectorAll('.ad-reply').forEach(function(el){
el.addEventListener('click',function(e){
e.stopPropagation();
var idx=parseInt(el.getAttribute('data-idx'));
var total=parseInt(el.getAttribute('data-total'));
showReplyModal(tickets[idx],idx,total);
});
});
document.querySelectorAll('.ad-resolve').forEach(function(el){
el.addEventListener('click',function(e){
e.stopPropagation();
var idx=parseInt(el.getAttribute('data-idx'));
var total=parseInt(el.getAttribute('data-total'));
var realIdx=tickets.indexOf(tickets[idx]);
if(realIdx>-1&&confirm('Mark this ticket as resolved?')){
tickets[realIdx].status='resolved';
saveTickets(tickets,load);
}
});
});
}

function showReplyModal(ticket,idx,total){
var overlay=document.getElementById('supportReplyModal');
var body=document.getElementById('replyModalBody');
document.getElementById('replyModalTitle').textContent='Ticket #'+(ticket.id||idx+1)+' - '+ticket.subject;
var replyHtml='';
if(ticket.admin_response){
replyHtml='<span class="support-reply-label">Your Response</span><div class="support-reply">'+ticket.admin_response+'</div>';
}
body.innerHTML='<div style="margin-bottom:8px;"><strong>From:</strong> '+ticket.name+' ('+ticket.email+')</div>'+
'<div style="margin-bottom:16px;"><strong>Date:</strong> '+ticket.date+' | <strong>Status:</strong> <span class="ticket-status '+(ticket.status||'open')+'">'+(ticket.status||'open')+'</span></div>'+
'<h4 style="font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--text-light);margin-bottom:8px;">Message</h4>'+
'<div class="support-message">'+ticket.message+'</div>'+
replyHtml+
'<hr style="margin:20px 0;border:none;border-top:1px solid var(--border)">'+
'<h4 style="font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--text-light);margin-bottom:8px;">Reply to Ticket</h4>'+
'<div class="form-group"><textarea id="replyText" rows="4" style="width:100%;padding:12px;border:1px solid var(--border);font-family:var(--font);font-size:14px;outline:none;resize:vertical;" placeholder="Type your response...">'+(ticket.admin_response||'')+'</textarea></div>'+
'<div style="display:flex;gap:8px;"><button class="btn btn-success" id="sendReplyBtn"><i class="fas fa-reply"></i> Send Reply</button></div>';
overlay.style.display='flex';
document.getElementById('sendReplyBtn').addEventListener('click',function(){
var reply=document.getElementById('replyText').value.trim();
if(!reply){alert('Please enter a reply.');return;}
var realIdx=tickets.indexOf(ticket);
if(realIdx>-1){
tickets[realIdx].admin_response=reply;
tickets[realIdx].status='resolved';
saveTickets(tickets,function(){overlay.style.display='none';load();});
}
});
}

function saveTickets(tickets,callback){
fetch(apiUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'support',data:tickets})})
.then(function(r){return r.json()})
.then(function(res2){
if(res2.success&&callback)callback();
else if(!res2.success)alert('Error saving.');
})
.catch(function(){alert('Error saving.');});
}

document.getElementById('replyModalClose').addEventListener('click',function(){document.getElementById('supportReplyModal').style.display='none';});
document.getElementById('supportReplyModal').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});
document.getElementById('supportFilter').addEventListener('change',load);

load();
})();
</script>
