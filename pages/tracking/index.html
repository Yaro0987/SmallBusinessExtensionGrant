<section class="track-hero">
<div class="container">
<div class="track-hero-inner" data-anim>
<div class="label">Track Your Application</div>
<h1>Check Your <span>Grant Status</span></h1>
<p>Enter your Application ID to check the status of your grant application and receive updates.</p>
</div>
</div>
</section>

<section class="track-form-section">
<div class="container">
<div class="track-form-wrap" data-anim>
<div class="form-group">
<label>Enter Your Application ID</label>
<div class="track-input-group">
<input type="text" id="trackAppId" placeholder="e.g. SBG-APP-2026-29344" style="flex:1;padding:14px 18px;border:1px solid var(--border);font-family:var(--font);font-size:15px;outline:none;">
<button class="btn btn-primary" id="trackLookupBtn" style="padding:14px 28px;font-size:13px;">Look Up <i class="fas fa-search"></i></button>
</div>
<small style="color:var(--text-light);margin-top:8px;display:block;">Your Application ID was sent to your email after submission.</small>
</div>
</div>
</div>
</section>

<section class="track-result-section" id="trackResultSection" style="display:none;">
<div class="container">
<div id="trackResult" class="track-result"></div>
</div>
</section>

<style>
.track-hero{padding:140px 0 40px;background:var(--primary);position:relative}
.track-hero-inner{max-width:700px}
.track-hero-inner .label{display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--accent);border:1px solid rgba(201,151,91,.3);padding:6px 16px;margin-bottom:20px}
.track-hero-inner h1{font-size:44px;font-weight:900;color:var(--white);letter-spacing:-1.5px}
.track-hero-inner h1 span{color:var(--accent)}
.track-hero-inner p{font-size:16px;color:rgba(255,255,255,.55);max-width:600px;line-height:1.8}
.track-form-section{padding:60px 0 80px}
.track-form-wrap{max-width:600px}
.track-input-group{display:flex;gap:12px}
@media(max-width:600px){.track-input-group{flex-direction:column}.track-hero-inner h1{font-size:30px}.track-form-section{padding:40px 0 60px}}
.track-result{background:var(--white);border:1px solid var(--border);padding:32px;max-width:600px}
.track-result .tr-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.track-result .tr-header h3{font-size:20px;font-weight:900;color:var(--primary);margin:0}

.track-result .tr-not-found h3{font-size:20px;font-weight:800;color:var(--primary);margin-bottom:8px}
.track-result .tr-not-found p{color:var(--text-light)}
